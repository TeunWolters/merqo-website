{{# ════════════════════════════════════════════════════════════
    STICKY IN-PAGE NAVIGATIE
    Gebruik: {{ partial:partials/page-nav
       items="Label 1|anchor-id-1,Label 2|anchor-id-2,Label 3|anchor-id-3"
    }}
    ════════════════════════════════════════════════════════════ #}}

<nav
  x-data="pageNav('{{ items }}')"
  x-show="visible"
  x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 -translate-y-full"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100 translate-y-0"
  x-transition:leave-end="opacity-0 -translate-y-full"
  class="fixed left-0 right-0 z-40"
  style="top:80px; background:rgba(240,237,231,0.97); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(30,31,27,0.07); box-shadow:0 1px 0 rgba(30,31,27,0.04);"
  aria-label="Paginanavigatie"
>
  <div class="max-w-7xl mx-auto px-6 lg:px-10">
    <div class="flex items-center gap-1 overflow-x-auto no-scrollbar" style="height:44px;">
      <template x-for="item in navItems" :key="item.id">
        <a
          :href="'#' + item.id"
          @click.prevent="scrollTo(item.id)"
          class="flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full transition-all duration-200 whitespace-nowrap"
          :class="active === item.id
            ? 'text-[#ed6b46] bg-[rgba(237,107,70,0.08)]'
            : 'text-[rgba(30,31,27,0.55)] hover:text-[#1E1F1B] hover:bg-[rgba(30,31,27,0.05)]'"
          :style="active === item.id ? 'font-weight:700;' : ''"
          x-text="item.label"
        ></a>
      </template>
    </div>
  </div>
</nav>

<style>
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
</style>
