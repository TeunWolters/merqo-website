<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ seo_title ?? title ?? 'Gratis Marketingscan' }} - Merqo</title>
  <meta name="description" content="{{ seo_description ?? 'Gratis marketingscan van Merqo Creative Agency.' }}">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="csrf-token" content="{{ csrf_token }}">
  {{ vite src="resources/js/site.js|resources/css/site.css" }}
  <style>
    body { margin: 0; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body>

  {{# Donkere navigatiebalk #}}
  <header style="position:fixed; top:0; left:0; right:0; z-index:50; background:#1E1F1B; height:80px;">
    <div class="max-w-7xl mx-auto px-6 lg:px-10" style="height:100%; display:flex; align-items:center; justify-content:space-between;">

      {{# Logo #}}
      <a href="/" style="display:flex; align-items:center;">
        <img src="/assets/merqo-logo-white.svg" alt="Merqo Creative Agency" style="height:28px; width:auto;">
      </a>

      {{# Nav links #}}
      <nav style="display:flex; align-items:center; gap:0.25rem;">
        <a href="/branding"  style="font-family:var(--font-body); font-size:14px; color:rgba(240,237,231,0.6); text-decoration:none; padding:0.5rem 1rem; border-radius:999px; transition:color 0.2s;" onmouseover="this.style.color='#F0EDE7'" onmouseout="this.style.color='rgba(240,237,231,0.6)'">Diensten</a>
        <a href="/projecten" style="font-family:var(--font-body); font-size:14px; color:rgba(240,237,231,0.6); text-decoration:none; padding:0.5rem 1rem; border-radius:999px; transition:color 0.2s;" onmouseover="this.style.color='#F0EDE7'" onmouseout="this.style.color='rgba(240,237,231,0.6)'">Projecten</a>
        <a href="/over-ons"  style="font-family:var(--font-body); font-size:14px; color:rgba(240,237,231,0.6); text-decoration:none; padding:0.5rem 1rem; border-radius:999px; transition:color 0.2s;" onmouseover="this.style.color='#F0EDE7'" onmouseout="this.style.color='rgba(240,237,231,0.6)'">Over ons</a>
        <a href="/contact"   style="font-family:var(--font-body); font-size:14px; color:rgba(240,237,231,0.6); text-decoration:none; padding:0.5rem 1rem; border-radius:999px; transition:color 0.2s;" onmouseover="this.style.color='#F0EDE7'" onmouseout="this.style.color='rgba(240,237,231,0.6)'">Contact</a>
      </nav>

      {{# CTA #}}
      <a href="/contact" class="btn-primary" style="font-size:13px;">
        Samenwerken
      </a>

    </div>
  </header>

  {{ template_content }}

</body>
</html>
